name: select_ai_py_tests
on:
  push:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ ubuntu-latest ]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - name: Check out python-select-ai repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Replace dot in python version with empty space
        run: |
          python_version=${{matrix.python-version}}
          new_version="${python_version//./}"
          echo "PYTHON_VERSION_WITHOUT_DOT=${new_version}" >> $GITHUB_ENV

      - name: Install select_ai with core dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install pytest anyio
          pip install -e .

      - name: Debug vector index secret wiring
        run: |
          python - <<'PY'
          import hashlib
          import os
          from urllib.parse import urlparse

          def log_env(name):
              value = os.environ.get(name)
              if value is None:
                  print(f"{name}: missing")
                  return
              digest = hashlib.sha256(value.encode()).hexdigest()[:12]
              print(
                  f"{name}: set len={len(value)} stripped={value == value.strip()} "
                  f"sha256_12={digest}"
              )

          for env_name in (
              "PYSAI_TEST_USER",
              "PYTEST_TEST_OBJSTORE_EMBEDDING_LOC",
              "PYTEST_TEST_OBJSTORE_USERNAME",
              "PYTEST_TEST_OBJSTORE_PASSWORD",
          ):
              log_env(env_name)

          location = os.environ.get("PYTEST_TEST_OBJSTORE_EMBEDDING_LOC")
          if location:
              print(
                  "PYTEST_TEST_OBJSTORE_EMBEDDING_LOC "
                  f"host={urlparse(location.strip()).hostname}"
              )

          user = os.environ.get("PYSAI_TEST_USER")
          if user:
              print(f"PYSAI_TEST_USER uppercase={user == user.upper()}")
          PY
        env:
          PYSAI_TEST_USER: ${{ secrets.PYSAI_TEST_USER }}_${{env.PYTHON_VERSION_WITHOUT_DOT}}
          PYTEST_TEST_OBJSTORE_EMBEDDING_LOC: ${{ secrets.PYTEST_TEST_OBJSTORE_EMBEDDING_LOC }}
          PYTEST_TEST_OBJSTORE_USERNAME: ${{ secrets.PYTEST_TEST_OBJSTORE_USERNAME }}
          PYTEST_TEST_OBJSTORE_PASSWORD: ${{ secrets.PYTEST_TEST_OBJSTORE_PASSWORD }}

      - name: Run select_ai tests
        run: |
          python_version=${{matrix.python-version}}
          pytest tests/create_schema.py
          pytest -vv
        env:
          PYSAI_TEST_USER: ${{ secrets.PYSAI_TEST_USER }}_${{env.PYTHON_VERSION_WITHOUT_DOT}}
          PYSAI_TEST_USER_PASSWORD: ${{ secrets.PYSAI_TEST_USER_PASSWORD }}
          PYSAI_TEST_ADMIN_USER: ${{ secrets.PYSAI_TEST_ADMIN_USER }}
          PYSAI_TEST_ADMIN_PASSWORD: ${{ secrets.PYSAI_TEST_ADMIN_PASSWORD }}
          PYSAI_TEST_CONNECT_STRING: ${{ secrets.PYSAI_TEST_CONNECT_STRING }}
          PYSAI_TEST_OCI_USER_OCID: ${{ secrets.PYSAI_TEST_OCI_USER_OCID }}
          PYSAI_TEST_OCI_TENANCY_OCID: ${{ secrets.PYSAI_TEST_OCI_TENANCY_OCID }}
          PYSAI_TEST_OCI_PRIVATE_KEY: ${{ secrets.PYSAI_TEST_OCI_PRIVATE_KEY }}
          PYSAI_TEST_OCI_FINGERPRINT: ${{ secrets.PYSAI_TEST_OCI_FINGERPRINT }}
          PYSAI_TEST_OCI_COMPARTMENT_ID: ${{ secrets.PYSAI_TEST_OCI_COMPARTMENT_ID }}
          PYSAI_TEST_EMAIL_CRED_USERNAME: ${{ secrets.PYSAI_TEST_EMAIL_CRED_USERNAME }}
          PYSAI_TEST_EMAIL_CRED_PASSWORD: ${{ secrets.PYSAI_TEST_EMAIL_CRED_PASSWORD }}
          PYSAI_TEST_SLACK_USERNAME: ${{ secrets.PYSAI_TEST_SLACK_USERNAME }}
          PYSAI_TEST_SLACK_PASSWORD: ${{ secrets.PYSAI_TEST_SLACK_PASSWORD }}
          PYSAI_TEST_EMAIL_RECIPIENT: ${{secrets.PYSAI_TEST_EMAIL_RECIPIENT}}
          PYSAI_TEST_EMAIL_SENDER: ${{secrets.PYSAI_TEST_EMAIL_SENDER}}
          PYSAI_TEST_EMAIL_SMTPHOST: ${{secrets.PYSAI_TEST_EMAIL_SMTPHOST}}
          PYSAI_TEST_OPENAI_API_KEY: ${{secrets.PYSAI_TEST_OPENAI_API_KEY}}
          PYTEST_TEST_OBJSTORE_EMBEDDING_LOC: ${{ secrets.PYTEST_TEST_OBJSTORE_EMBEDDING_LOC }}
          PYTEST_TEST_OBJSTORE_USERNAME: ${{ secrets.PYTEST_TEST_OBJSTORE_USERNAME }}
          PYTEST_TEST_OBJSTORE_PASSWORD: ${{ secrets.PYTEST_TEST_OBJSTORE_PASSWORD }}
